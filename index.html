<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProJet CJP260Plus 3D Dental Printer | PrecisionLab</title>
  <meta name="description" content="Professional 3D Dental Printer with CJP technology. 236×185×127mm build size, ±0.1mm precision. For dental labs and clinics." />
  <meta name="keywords" content="3D Dental Printer, CJP260Plus, Dental Lab Equipment, 3D Printer, ProJet, Dental Model Printer" />
  
  <meta property="og:title" content="ProJet CJP260Plus 3D Dental Printer | PrecisionLab" />
  <meta property="og:description" content="Professional 3D Dental Printer with CJP technology for dental applications." />
  <meta property="og:type" content="product" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 600: '#0284c7', 800: '#075985', 900: '#0f172a' } }
        }
      }
    }
  </script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-slate-900 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { ArrowRight, CheckCircle2, Menu, X, Printer, Scale, ShieldCheck, Zap, Box, Settings, Send, Phone, Mail, Scan, Crown } = lucideReact;

    const Header = () => {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <header className={`fixed w-full z-50 transition-all ${isScrolled ? 'bg-white shadow-md py-3' : 'bg-transparent py-5'}`}>
          <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div className="flex items-center gap-2">
              <div className={`p-2 rounded-lg ${isScrolled ? 'bg-brand-600 text-white' : 'bg-white/80 backdrop-blur'}`}>
                <Printer size={24} />
              </div>
              <span className="text-xl font-bold">Precision<span className="text-brand-600">Lab</span></span>
            </div>
            <div className="hidden md:flex gap-6">
              <a href="#features" className="hover:text-brand-600">Features</a>
              <a href="#specs" className="hover:text-brand-600">Specs</a>
              <a href="#applications" className="hover:text-brand-600">Applications</a>
              <a href="#contact" className="bg-brand-600 text-white px-5 py-2 rounded-full text-sm font-semibold">Request Quote</a>
            </div>
            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
              {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
            </button>
          </div>
          {isMenuOpen && (
            <div className="md:hidden bg-white border-t p-4 space-y-3">
              <a href="#features" className="block">Features</a>
              <a href="#specs" className="block">Specs</a>
              <a href="#applications" className="block">Applications</a>
              <a href="#contact" className="block text-brand-600 font-semibold">Request Quote</a>
            </div>
          )}
        </header>
      );
    };

    const Hero = () => (
      <section className="pt-32 pb-20 bg-gradient-to-br from-slate-50 to-blue-50">
        <div className="max-w-7xl mx-auto px-4">
          <div className="text-center mb-12">
            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-100 text-brand-800 text-sm font-semibold mb-6">
              <span className="w-2 h-2 rounded-full bg-brand-600 animate-pulse"></span>
              CJP Technology - Dental Professional Series
            </div>
            <h1 className="text-4xl md:text-5xl font-extrabold text-brand-900 mb-6">
              ProJet <span className="text-brand-600">CJP260Plus</span> 3D Dental Printer
            </h1>
            <p className="text-xl text-gray-600 max-w-2xl mx-auto mb-8">
              Professional CJP (Color Jet Printing) technology for high-precision dental model production. Designed for dental labs, clinics, and orthodontic centers.
            </p>
            <div className="flex flex-wrap justify-center gap-6 text-sm font-medium text-gray-500 mb-8">
              <span className="flex items-center gap-2"><CheckCircle2 size={16} className="text-brand-600" />236×185×127mm Build Size</span>
              <span className="flex items-center gap-2"><CheckCircle2 size={16} className="text-brand-600" />±0.1mm Precision</span>
              <span className="flex items-center gap-2"><CheckCircle2 size={16} className="text-brand-600" />Medical Grade Materials</span>
            </div>
            <a href="#contact" className="inline-flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white px-8 py-4 rounded-lg font-semibold shadow-lg">
              Request Quote <ArrowRight size={20} />
            </a>
          </div>
        </div>
      </section>
    );

    const Features = () => {
      const features = [
        { title: "CJP Technology", description: "Color Jet Printing technology enables fast, reliable printing with excellent surface finish for dental applications." },
        { title: "High Precision", description: "±0.1mm accuracy with 0.05-0.1mm layer thickness ensures detailed, accurate dental models every time." },
        { title: "Medical Grade Materials", description: "Supports medical resin, wax, and石膏 materials certified for dental applications." },
        { title: "Fast Production", description: "8-12 seconds per layer printing speed maximizes throughput for busy dental labs." },
        { title: "Large Build Volume", description: "236×185×127mm build size accommodates multiple models or larger dental restorations." },
        { title: "Wide File Format Support", description: "Compatible with STL, PLY, OBJ, and 3MF CAD files from all major dental scanners." }
      ];

      return (
        <section id="features" className="py-20 bg-white">
          <div className="max-w-7xl mx-auto px-4">
            <div className="text-center mb-16">
              <h2 className="text-3xl font-bold text-brand-900 mb-4">Product Features</h2>
              <p className="text-gray-600 max-w-2xl mx-auto">Professional-grade features designed for demanding dental lab environments.</p>
            </div>
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
              {features.map((f, i) => (
                <div key={i} className="bg-gray-50 rounded-xl p-6 hover:shadow-lg transition">
                  <h3 className="text-lg font-bold text-gray-900 mb-2">{f.title}</h3>
                  <p className="text-gray-600">{f.description}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const SpecsTable = () => {
      const specs = [
        ["Build Size", "236 × 185 × 127 mm"],
        ["Layer Thickness", "0.05 - 0.1 mm"],
        ["Print Speed", "8-12 seconds/layer"],
        ["Precision", "±0.1 mm"],
        ["Materials", "Medical Resin / Wax / Plaster"],
        ["File Formats", "STL / PLY / OBJ / 3MF"],
        ["Power Consumption", "200W"],
        ["Voltage", "110-220V"],
        ["Machine Dimensions", "600 × 500 × 700 mm"],
        ["Net Weight", "80 kg"]
      ];

      return (
        <section id="specs" className="py-20 bg-gray-50">
          <div className="max-w-4xl mx-auto px-4">
            <div className="text-center mb-12">
              <h2 className="text-3xl font-bold text-brand-900 mb-4">Technical Specifications</h2>
            </div>
            <div className="bg-white rounded-xl shadow-lg overflow-hidden">
              <table className="w-full">
                <tbody>
                  {specs.map((row, i) => (
                    <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                      <td className="px-6 py-4 font-medium text-gray-900">{row[0]}</td>
                      <td className="px-6 py-4 text-gray-600">{row[1]}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </section>
      );
    };

    const Applications = () => {
      const apps = [
        { title: "Oral Scanning", description: "Perfect for creating accurate digital impressions from oral scanner data." },
        { title: "Surgical Guides", description: "Print precise surgical guides for implant placement with optimal accuracy." },
        { title: "Orthodontic Models", description: "Produce detailed orthodontic models for aligner therapy planning." },
        { title: "Restoration Models", description: "Create accurate crown, bridge, and veneer models for lab fabrication." },
        { title: "Temporary Crowns", description: "Print temporary crowns and bridges for immediate patient fitting." },
        { title: "Fixed Prosthodontics", description: "Produce precise models for fixed dental restorations." }
      ];

      return (
        <section id="applications" className="py-20 bg-white">
          <div className="max-w-7xl mx-auto px-4">
            <div className="text-center mb-16">
              <h2 className="text-3xl font-bold text-brand-900 mb-4">Applications</h2>
              <p className="text-gray-600">Wide range of dental applications for modern dentistry.</p>
            </div>
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              {apps.map((app, i) => (
                <div key={i} className="bg-slate-50 rounded-lg p-5">
                  <h3 className="font-bold text-brand-900 mb-2">{app.title}</h3>
                  <p className="text-sm text-gray-600">{app.description}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const ContactForm = () => (
      <section id="contact" className="py-20 bg-gray-50">
        <div className="max-w-2xl mx-auto px-4">
          <div className="bg-white rounded-2xl shadow-xl p-8">
            <h2 className="text-2xl font-bold text-center mb-2">Request a Quote</h2>
            <p className="text-gray-500 text-center mb-8">Get pricing and lead times within 24 hours</p>
            <form action="https://formsubmit.co/admin@precisionlab.shop" method="POST" className="space-y-4">
              <input type="hidden" name="_subject" value="New Request: CJP260Plus 3D Dental Printer" />
              <div className="grid md:grid-cols-2 gap-4">
                <input type="text" name="name" required placeholder="Full Name" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-600 outline-none" />
                <input type="email" name="email" required placeholder="Email Address" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-600 outline-none" />
              </div>
              <input type="text" name="company" placeholder="Company / Clinic" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-600 outline-none" />
              <textarea name="message" rows={4} required placeholder="Your requirements..." className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-600 outline-none"></textarea>
              <button type="submit" className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-4 rounded-lg transition">Send Quote Request</button>
            </form>
          </div>
        </div>
      </section>
    );

    const Footer = () => (
      <footer className="bg-slate-900 text-slate-400 py-12">
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex flex-col md:flex-row justify-between items-center gap-6">
            <div className="flex items-center gap-2 text-white">
              <Printer size={24} className="text-brand-500" />
              <span className="text-xl font-bold">PrecisionLab</span>
            </div>
            <div className="flex gap-6 text-sm">
              <span>admin@precisionlab.shop</span>
              <span>Whatsapp: +1 (732) 823-9666</span>
            </div>
          </div>
          <div className="mt-8 pt-8 border-t border-slate-800 text-center text-sm">
            © 2026 PrecisionLab Equipment Co. All rights reserved.
          </div>
        </div>
      </footer>
    );

    const App = () => (
      <div>
        <Header />
        <main>
          <Hero />
          <Features />
          <SpecsTable />
          <Applications />
          <ContactForm />
        </main>
        <Footer />
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
